<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Filter System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Product Filter System</h1>


  <section class="box">
    <h2>Add Product</h2>
    <input type="text" id="nameInput" placeholder="Name" />
    <input type="text" id="categoryInput" placeholder="Category" />
    <input type="number" id="priceInput" placeholder="Price" />
    <input type="number" id="ratingInput" placeholder="Rating" step="0.1" />
    <button onclick="handleAddProduct()">Add Product</button>
  </section>


  <section class="box">
    <h2>Search</h2>
    <input type="text" id="searchInput" placeholder="Search by name..." oninput="handleSearchInput()" />
  </section>


  <section class="box">
    <h2>Filter & Sort</h2>

    <label>Category:</label>
    <select id="categoryFilter" onchange="handleFilterChange()">
      <option value="">All</option>
    </select>

    <label>Min Price:</label>
    <input type="number" id="minPriceInput" onchange="handleFilterChange()" />

    <label>Max Price:</label>
    <input type="number" id="maxPriceInput" onchange="handleFilterChange()" />

    <label>Sort By:</label>
    <select id="sortBySelect" onchange="handleFilterChange()">
      <option value="">None</option>
      <option value="price">Price</option>
      <option value="rating">Rating</option>
      <option value="name">Name</option>
    </select>

    <label>Order:</label>
    <select id="sortOrderSelect" onchange="handleFilterChange()">
      <option value="asc">Ascending</option>
      <option value="desc">Descending</option>
    </select>

    <button onclick="resetFilters()">Reset Filters</button>
  </section>

  <section class="box">
    <h2>Products</h2>
    <table id="productTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Rating</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="productTableBody"></tbody>
    </table>
  </section>

  <script src="script.js"></script>
</body>
</html>
